# L2 Constraints — Schema-Validated YAML
#
# Encodes all L2 agent constraints from AGENTS.md § Guardrails as structured YAML.
# Consumed by: scripts/validate_l2_constraints.py
# Reference: AGENTS.md § Guardrails, § File Writing Guardrails, § Security Guardrails

constraints:
  - id: "no-heredoc-writes"
    description: >
      Never use heredocs (cat >> file << 'EOF' or Python inline << 'PYEOF') to write
      Markdown or code content. Backticks, triple-backtick fences, and special characters
      silently corrupt or truncate output through the VS Code terminal tool.
      Always use create_file or replace_string_in_file built-in tools.
    enforcement: "pre-commit"
    severity: "blocking"

  - id: "no-terminal-file-io-redirect"
    description: >
      Never use terminal file I/O redirection (> file, >> file, | tee file, | cat >> file)
      in scripts. Shell quoting causes interleaving and corruption.
      Always use create_file or replace_string_in_file (built-in VS Code tools).
    enforcement: "pre-commit"
    severity: "blocking"

  - id: "no-force-push-to-main"
    description: >
      Never git push --force to main. Force pushes to main destroy commit history and
      break the audit trail. Only permitted on feature branches with explicit instruction.
    enforcement: "runtime"
    severity: "blocking"

  - id: "no-lockfile-hand-edits"
    description: >
      Never edit any lockfile by hand. Lockfiles (uv.lock, package-lock.json) must be
      generated by their respective tools to maintain dependency integrity.
    enforcement: "review"
    severity: "blocking"

  - id: "no-secrets-in-commits"
    description: >
      Never commit secrets, API keys, or credentials of any kind. This includes
      $GITHUB_TOKEN, $GH_TOKEN, and any bearer tokens or API key strings.
      Use environment variables or gh auth token instead.
    enforcement: "pre-commit"
    severity: "blocking"

  - id: "no-multi-line-gh-body"
    description: >
      Never pass multi-line gh issue or gh pr bodies via --body "..." on the command line.
      Shell quoting and backtick interpolation cause gh to hang or silently corrupt content.
      Always write the body to a temp file and use --body-file <path>.
    enforcement: "runtime"
    severity: "blocking"

  - id: "run-lint-before-commit"
    description: >
      Run ruff check scripts/ tests/ and ruff format --check scripts/ tests/ before every
      git commit or git push. Lint failures must be resolved before committing.
    enforcement: "pre-commit"
    severity: "blocking"

  - id: "run-tests-before-commit"
    description: >
      Run uv run pytest tests/ -x -m 'not slow and not integration' -q before every commit
      to verify no regressions. All tests must pass before pushing.
    enforcement: "pre-commit"
    severity: "warning"

  - id: "validate-agent-files-before-commit"
    description: >
      Run scripts/validate_agent_files.py --all if any .github/agents/*.agent.md file
      changed. Agent files must pass validation before committing.
    enforcement: "pre-commit"
    severity: "blocking"

  - id: "uv-run-only"
    description: >
      Always invoke Python scripts with uv run python, never directly with python or
      .venv/bin/python. This ensures the correct locked environment is used regardless
      of shell state.
    enforcement: "review"
    severity: "warning"
