schema_version: 1
name: session_events_schema
owner_issue: 552
purpose: >
  JSON Schema for .cache/session-events.jsonl event stream. Each line is a JSON
  object representing a discrete session event (phase start/complete, delegation,
  commit, review, etc.). Enables queryable provenance tracking for scratchpad →
  commits/issues/PRs without full OpenTelemetry infrastructure.

# Migration path: This lightweight JSONL format is OTel-compatible by design.
# Issue #554 will implement full OpenTelemetry tracing with span context propagation.

# Derived from: docs/plans/2026-04-13-open-harness-sprint.md Phase 7
# Query examples: jq '.[] | select(.issue == 551)' .cache/session-events.jsonl

type: object
required:
  - timestamp
  - event_type
  - branch
additionalProperties: true

properties:
  timestamp:
    type: string
    format: date-time
    description: ISO 8601 timestamp with timezone (YYYY-MM-DDTHH:MM:SS.sssZ)
    
  event_type:
    type: string
    enum:
      - session_start
      - session_end
      - phase_start
      - phase_complete
      - delegation
      - commit
      - review
      - issue_comment
    description: >
      Type of event being logged. Extensible for future event types
      (e.g., rate_limit_hit, context_compact).
      
  branch:
    type: string
    description: Git branch name (e.g., feat-open-harness-sprint)
    
  phase:
    type: [string, "null"]
    description: >
      Phase identifier (e.g., "Phase 1", "Phase 2 Review"). Null for
      session-level events.
    
  agent:
    type: [string, "null"]
    description: >
      Agent name that performed the action (e.g., "Executive Scripter",
      "Research Scout"). Null if not agent-initiated.
      
  issue:
    type: [integer, array, "null"]
    description: >
      GitHub issue number(s) in scope. Can be single int, array of ints,
      or null if not issue-related.
    oneOf:
      - type: integer
      - type: array
        items:
          type: integer
      - type: "null"
      
  commit_sha:
    type: [string, "null"]
    description: >
      Git commit SHA (short or full). Null if event predates commit.
      
  pr_number:
    type: [integer, "null"]
    description: Pull request number if event relates to a PR
    
  deliverables:
    type: [array, "null"]
    description: >
      List of deliverable paths or descriptions produced in this event.
      Example: ["data/scratchpad-schema.yml", "scripts/validate_scratchpad.py"]
    items:
      type: string
      
  notes:
    type: [string, "null"]
    description: Optional free-text notes or context

examples:
  - timestamp: "2026-04-13T10:30:00.000Z"
    event_type: session_start
    branch: feat-open-harness-sprint
    phase: null
    agent: "Executive Orchestrator"
    issue: [551, 552]
    commit_sha: null
    pr_number: null
    deliverables: null
    notes: "Starting Open Harness sprint with 2 issues in scope"
    
  - timestamp: "2026-04-13T12:45:30.123Z"
    event_type: phase_complete
    branch: feat-open-harness-sprint
    phase: "Phase 4"
    agent: "Executive Scripter"
    issue: 552
    commit_sha: "a1b2c3d"
    pr_number: null
    deliverables:
      - "data/scratchpad-schema.yml"
      - "scripts/validate_scratchpad.py"
      - "tests/test_validate_scratchpad.py"
    notes: "Schema validation implemented and tested"
    
  - timestamp: "2026-04-13T14:00:00.000Z"
    event_type: delegation
    branch: feat-open-harness-sprint
    phase: "Phase 5"
    agent: "Executive Orchestrator"
    issue: 552
    commit_sha: null
    pr_number: null
    deliverables: null
    notes: "Delegated to Executive Scripter for export tooling"
