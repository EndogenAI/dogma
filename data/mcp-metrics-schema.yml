schema_version: 1
name: mcp_quality_metrics_schema
owner_issue: 495
purpose: Metrics schema and quality gate contracts for MCP telemetry and evaluation.

identity:
  tool_name:
    type: string
    required: true
    description: Canonical MCP tool identifier.
    allowed_values:
      - check_substrate
      - validate_agent_file
      - validate_synthesis
      - scaffold_agent
      - scaffold_workplan
      - run_research_scout
      - query_docs
      - prune_scratchpad
  tool_version:
    type: string
    required: true
    description: Version string for the instrumented tool.
  run_id:
    type: string
    required: true
    description: Unique ID for a measurement run or capture window.
  timestamp_utc:
    type: string
    format: date-time
    required: true
    description: UTC timestamp in ISO-8601 format.

measurement_record:
  metric_dimension:
    type: string
    required: false
    description: Dimension name for the metric value (performance|semantic|defect|classical_quality|usability_proxy).
  value:
    type: number
    required: false
    description: Scalar metric value for the selected dimension and field.
  test_case_id:
    type: string
    required: false
    description: Identifier of test case or scenario used to generate the metric.
  methodology_notes:
    type: string
    required: false
    description: Notes on how the metric was produced, sampled, or normalized.

per_record_jsonl:
  # Schema for individual JSONL rows written by the background writer in dogma_server.py.
  # Note: required: false on all fields — JSONL rows are observation inputs, not governed outputs.
  # Governed outputs (aggregated metrics) are defined in measurement_surfaces above.
  tool_name:
    type: string
    required: true
    description: Canonical MCP tool identifier (matches identity.tool_name allowed_values).
  timestamp_utc:
    type: string
    format: date-time
    required: true
    description: UTC timestamp of tool invocation in ISO-8601 format.
  latency_ms:
    type: number
    unit: ms
    required: true
    description: Wall-clock duration of the tool call in milliseconds.
  is_error:
    type: boolean
    required: true
    description: True if the tool call raised an exception or returned ok=false.
  error_type:
    type: string
    required: false
    description: Exception class name or "tool_error" for logic failures. Absent (not null) if no error.
  source:
    type: string
    required: true
    allowed_values:
      - live
      - synthetic
    description: "live" for records written by the instrumented server; "synthetic" for seed data.
  tool_version:
    type: string
    required: true
    description: "Version string from mcp_server/_version.py; format: {pkg_version}.{BRANCH_COUNTER}."

measurement_surfaces:
  performance:
    latency_ms_p95:
      type: number
      unit: ms
      required: true
    error_rate_pct:
      type: number
      unit: percent
      required: true
      min: 0.0
      max: 100.0
    tool_error_count:
      type: integer
      required: true
      min: 0
    sample_size:
      type: integer
      required: true
      min: 1
  semantic:
    faithfulness:
      type: number
      required: true
      min: 0.0
      max: 1.0
    answer_relevance:
      type: number
      required: true
      min: 0.0
      max: 1.0
    context_precision:
      type: number
      required: true
      min: 0.0
      max: 1.0
  defect:
    severity_level_mean:
      type: number
      required: true
      min: 0.0
      max: 4.0
    severity_distribution_0_to_4:
      type: object
      required: false
      required_keys: ["0", "1", "2", "3", "4"]
      value_type: integer
      description: Count distribution by Nielsen-adapted severity levels.
  classical_quality:
    correctness:
      type: number
      required: true
      min: 0.0
      max: 1.0
    completeness:
      type: number
      required: true
      min: 0.0
      max: 1.0
    precision:
      type: number
      required: true
      min: 0.0
      max: 1.0
  usability_proxy:
    umux_lite_equivalent:
      type: number
      required: true
      description: Agent-facing UMUX-Lite-equivalent usability proxy score.

telemetry_source_fields:
  gen_ai.tool.name:
    maps_to: identity.tool_name
    required: true
  gen_ai.operation.name:
    expected_value: execute_tool
    required: true
  error.type:
    expected_value: tool_error
    maps_to: measurement_surfaces.performance.tool_error_count
    required: false
  mcp.server.operation.duration:
    maps_to: measurement_surfaces.performance.latency_ms
    source_unit: s
    normalized_unit: ms
    required: true

quality_gate_thresholds:
  evaluation_window_calls: 100
  target_latency_p95_sec: 2.0
  alert_if_latency_p95_above_sec: 2.0
  fail_if_faithfulness_below: 0.75
  fail_if_tool_error_rate_above_pct: 5.0
  target_faithfulness: 0.80
  target_answer_relevance: 0.75
  target_context_precision: 0.70
  target_deepeval_task_completion: 0.75
  target_nielsen_severity_mean_max: 1.5
  target_umux_lite_equivalent_min: 68.0

dashboard_contract:
  purpose: Read-only architecture contract fields for MCP Web Dashboard (Phase 2).
  compatibility: Additive-only section; existing telemetry contracts remain unchanged.

  transport:
    snapshot_endpoint:
      type: string
      required: false
      default: /api/metrics
      description: REST snapshot endpoint consumed by dashboard client.
    stream_endpoint:
      type: string
      required: false
      default: /api/metrics/stream
      description: SSE endpoint consumed by browser EventSource.
    server_stream_type:
      type: string
      required: false
      allowed_values: [StreamingResponse]
      description: FastAPI transport primitive locked for MVP stream implementation.
    client_stream_type:
      type: string
      required: false
      allowed_values: [EventSource]
      description: Browser-native SSE client primitive locked for MVP frontend.
    stream_media_type:
      type: string
      required: false
      default: text/event-stream
      description: Expected media type for SSE responses.

  cors:
    allow_origins:
      type: array
      required: false
      default: ["http://localhost:5173"]
      items:
        type: string
      description: Locked MVP origin allowlist for local Vite development.
    config_mode:
      type: string
      required: false
      allowed_values: [hardcoded_mvp]
      description: CORS configuration mode for MVP.
    v2_escape_hatch_issue:
      type: integer
      required: false
      default: 506
      description: Tracking issue for env-configurable CORS origins in v2.

  ui:
    default_active_tab:
      type: string
      required: false
      default: overview
      allowed_values: [overview, tools, errors]
      description: MVP default tab state.
    tab_state_mode:
      type: string
      required: false
      allowed_values: [reactive_variable]
      description: Tab state managed by local reactive variable, not a router.
    routing_library:
      type: string
      required: false
      allowed_values: [none]
      description: Routing library usage is intentionally excluded from MVP.
    connection_states:
      type: array
      required: false
      default: [LIVE, STALE, ERROR]
      items:
        type: string
      description: Locked connection state machine order for stream status.

  visualization:
    chart_library:
      type: string
      required: false
      allowed_values: [layercake]
      description: Locked MVP chart library.
    prohibited_libraries:
      type: array
      required: false
      default: [svelte-chartjs, chart.js]
      items:
        type: string
      description: Explicitly prohibited chart libraries for MVP.

  offline_fallback:
    fixture_path:
      type: string
      required: false
      default: web/src/assets/fixture.json
      description: Static fixture path used before first successful live connection.
    activation_condition:
      type: string
      required: false
      default: before_first_successful_connection
      description: Condition when offline fixture is shown by dashboard client.
