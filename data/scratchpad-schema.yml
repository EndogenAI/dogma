schema_version: 1
name: scratchpad_structure_schema
owner_issue: 552
purpose: >
  Schema definition for .tmp/<branch>/<date>.md scratchpad files.
  Enforces minimum structural requirements for session-state persistence,
  cross-agent coordination, and phase-gate compliance.

# Derived from: AGENTS.md § Agent Communication, session-management SKILL.md
# Example files: .tmp/feat-research-550-harness-memory/2026-04-13.md

required_sections:
  - name: Session State
    heading_pattern: "^## Session State$"
    required: true
    description: >
      YAML block containing branch, date, active_phase, active_issues, blockers,
      last_agent, and phases list. Must parse as valid YAML.
    validation:
      - type: yaml_block
        must_parse: true
      - type: yaml_fields
        required_fields:
          - branch
          - date
          - active_phase
          - active_issues
          - blockers
          - last_agent
          - phases
    
  - name: Audit Trail
    heading_pattern: "^## Audit Trail$"
    required: true
    description: >
      Table logging each agent action with columns: Agent, Decision, Justification, Time.
      HTML comment header is allowed but not required.
    validation:
      - type: table_present
        min_rows: 0  # Empty table is valid (session just started)

  - name: Telemetry
    heading_pattern: "^## Telemetry$"
    required: true
    description: >
      Table tracking session metrics: Phases complete, Delegations made,
      Rate-limit events, Estimated tokens used.
    validation:
      - type: table_present
        min_rows: 1  # At least one metric row required

optional_sections:
  - name: Session Start
    heading_pattern: "^## Session Start$"
    description: >
      Encoding checkpoint: governing axiom statement + primary endogenous source.
      Strongly encouraged but not required (may be omitted in pre-workplan sessions).

  - name: Pre-Compact Checkpoint
    heading_pattern: "^## Pre-Compact Checkpoint$"
    description: >
      Context-window safety check before compaction. Records current phase,
      active issues, and key findings to preserve if history is compacted.

  - name: Executive Handoff
    heading_pattern: "^## Executive Handoff$"
    description: >
      End-of-session handoff notes for the next session: what was completed,
      what's blocked, recommended next session focus.

  - name: Session Summary
    heading_pattern: "^## Session Summary$"
    description: >
      Orientation point for next session. Written at session close by the executive.

  - name: Phase Output
    heading_pattern: "^## Phase \\d+ Output"
    description: >
      Results from a specific phase. Multiple instances allowed (Phase 1, Phase 2, etc.).
      Must be numbered consecutively (no skips).

  - name: Phase Review Output
    heading_pattern: "^## (Phase \\d+ )?Review Output$"
    description: >
      Review agent verdict for a specific phase or the overall workplan.
      Format: "## Review Output" or "## Phase N Review Output" are both valid.

session_state_schema:
  branch:
    type: string
    required: true
    description: "Git branch name (e.g., 'feat/research-550-harness-memory')"
    
  date:
    type: string
    format: date
    pattern: "^\\d{4}-\\d{2}-\\d{2}$"
    required: true
    description: "Session date in ISO 8601 format (YYYY-MM-DD)"
    
  active_phase:
    type: [string, "null"]
    required: true
    description: "Current phase identifier or null if between phases"
    
  active_issues:
    type: array
    items:
      type: integer
    required: true
    description: "List of GitHub issue numbers being worked in this session"
    
  blockers:
    type: array
    items:
      type: string
    required: true
    description: "List of blocking issues preventing progress (empty array if none)"
    
  last_agent:
    type: [string, "null"]
    required: true
    description: "Name of last agent to update scratchpad, or null"
    
  phases:
    type: array
    items:
      type: object
      required_fields:
        - name
        - status
      optional_fields:
        - agent
        - deliverables
        - effort
    required: true
    description: "List of phases with name, status, and optional metadata"

heading_hierarchy_rules:
  - H1 allowed: 1  # Title only
  - H2 allowed: unlimited  # Section headings
  - H3 allowed: unlimited  # Subsections
  - no_skip: true  # Cannot skip levels (H1 → H3 forbidden)
  - description: "Headings must not skip levels (e.g., H1 → H2 → H3, never H1 → H3)"

phase_numbering_rules:
  - pattern: "^## Phase (\\d+) (Output|Review Output)$"
  - consecutive: true  # Phase 1, Phase 2, ... (no gaps allowed)
  - description: "Phase sections must be numbered consecutively starting from 1"

date_consistency_rules:
  - filename_pattern: "^\\d{4}-\\d{2}-\\d{2}\\.md$"
  - session_state_date_must_match: true
  - description: "Date in filename must match 'date:' field in Session State YAML"

validation_error_codes:
  missing_required_section: "Required section '{}' not found"
  invalid_yaml: "Session State YAML block failed to parse: {}"
  date_mismatch: "Filename date '{}' does not match Session State date '{}'"
  heading_skip: "Heading hierarchy violation: skipped from H{} to H{}"
  phase_number_gap: "Phase numbering gap: found Phase {} but expected Phase {}"
  missing_session_state_field: "Session State missing required field: '{}'"
  table_not_found: "Required table in section '{}' not found"
