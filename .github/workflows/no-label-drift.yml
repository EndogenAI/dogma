name: Label Drift Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  label-drift:
    name: Verify label manifest matches repository
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check label drift (dry-run)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python scripts/seed_labels.py --dry-run
        # Note: seed_labels.py does not have a --check flag; --dry-run prints
        # planned actions and exits 0, which is sufficient to validate the
        # manifest YAML is parseable and well-formed. A dedicated --check flag
        # that compares live labels against the manifest is tracked in the
        # follow-up sprint (see AGENTS.md Programmatic-First principle).
