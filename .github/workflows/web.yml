name: Web

on:
  push:
    branches:
      - main
      - feat/**
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

permissions:
  contents: read

jobs:
  web:
    name: Build and Check Web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint web app (ESLint + a11y)
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Check web app
        run: npm run check
