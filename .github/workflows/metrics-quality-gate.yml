name: MCP Quality Gate

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

env:
  MCP_EVALUATION_WINDOW: 100

jobs:
  quality-gate:
    name: MCP metrics quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv sync --extra dev --extra mcp

      - name: Check for metrics data
        id: metrics_check
        run: |
          if [ ! -f ".cache/mcp-metrics/tool_calls.jsonl" ] || [ ! -s ".cache/mcp-metrics/tool_calls.jsonl" ]; then
            echo "No MCP metrics data found — skipping quality gate (expected on clean checkout)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run MCP quality gate
        id: gate
        if: steps.metrics_check.outputs.skip == 'false'
        continue-on-error: true
        run: |
          echo "Running MCP quality gate (evaluation window: $MCP_EVALUATION_WINDOW records)..."
          uv run python scripts/check_mcp_quality_gate.py --evaluation-window "$MCP_EVALUATION_WINDOW"

      - name: Alert on threshold breach
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::MCP quality gate failed — see scripts/check_mcp_quality_gate.py and the MCP metrics schema/config for current thresholds"
          echo "Review MCP metrics in .cache/mcp-metrics/ and use the script/schema as the source of truth for remediation"
          exit 1
