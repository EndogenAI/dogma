name: Quarterly Governance Audit

on:
  schedule:
    # First day of each quarter at 09:00 UTC
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch: # Allow manual trigger for out-of-cycle audits

jobs:
  quarterly-audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run encoding coverage check
        run: uv run python scripts/encoding_coverage.py --manifesto MANIFESTO.md --agents AGENTS.md > /tmp/encoding_output.txt

      - name: Run cross-reference density check
        run: uv run python scripts/measure_cross_reference_density.py --output /tmp/crd.json

      - name: Evaluate thresholds
        id: threshold_check
        run: |
          if uv run python scripts/check_governance_thresholds.py \
              --encoding-output /tmp/encoding_output.txt \
              --crd-json /tmp/crd.json \
              --thresholds data/governance-thresholds.yml; then
            echo "thresholds_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "thresholds_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open tracking issue on threshold breach
        if: steps.threshold_check.outputs.thresholds_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          QUARTER=$(python3 -c "
          from datetime import datetime
          m = datetime.utcnow().month
          y = datetime.utcnow().year
          q = (m - 1) // 3 + 1
          print(f'{y}-Q{q}')
          ")
          TITLE="chore(audit): quarterly governance audit \u2014 ${QUARTER} \u2014 threshold breach"
          # Duplicate guard: skip if an open issue with this title already exists
          EXISTING=$(gh issue list --state open --search "${TITLE}" --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "SKIP: tracking issue already open: #${EXISTING}"
            exit 0
          fi
          gh issue create \
            --title "${TITLE}" \
            --body "The scheduled quarterly governance audit detected metrics below defined thresholds in \`data/governance-thresholds.yml\`. Run \`uv run python scripts/check_governance_thresholds.py\` locally for details. Follow the protocol in \`docs/guides/quarterly-values-review.md\`. Triggered by: \`.github/workflows/quarterly-audit.yml\` (closes #386)." \
            --label "type:chore" \
            --label "area:docs" \
            --label "priority:medium"

      - name: Fail job if thresholds breached
        if: steps.threshold_check.outputs.thresholds_passed == 'false'
        run: exit 1
