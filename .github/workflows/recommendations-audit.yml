name: Recommendations Audit

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly at midnight Sunday
  workflow_dispatch: # Allow manual trigger

jobs:
  recommendations-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Refresh recommendations registry
        run: uv run python scripts/index_recommendations.py

      - name: Audit for orphaned recommendations
        run: uv run python scripts/audit_recommendation_status.py --dry-run --no-github
