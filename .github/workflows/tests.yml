name: Tests

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run pytest with coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: uv run pytest tests/ --cov=scripts --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Check coverage minimum
        run: |
          COVERAGE=$(uv run pytest tests/ --cov=scripts --cov-report=term-missing | grep -oP '(?<=TOTAL\s+)[0-9]+(?=%)')
          if [ "$COVERAGE" -lt 80 ]; then
            echo "Coverage ${COVERAGE}% is below 80% minimum"
            exit 1
          fi

  lint:
    name: Lint code style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv pip install ".[dev]"

      - name: Run ruff
        run: uv run ruff check scripts/ tests/

      - name: Run black (check)
        run: uv run black --check scripts/ tests/

  required:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always()
    steps:
      - name: Decide whether all tests and checks passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Tests or linting failed"
            exit 1
          fi
